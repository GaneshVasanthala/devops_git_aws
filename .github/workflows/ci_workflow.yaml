name: CI Pipeline — Build and Push to ECR

on:
  push:
    branches:
      - main        # triggers when code pushed to main

env:
  AWS_REGION:       us-east-2
  ECR_REPOSITORY:   ganesh-terraform-app    # your ECR repo name

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:

      # ── STEP 1: Checkout code ──────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── STEP 2: Login to AWS ───────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      # ── STEP 3: Login to ECR ───────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── STEP 4: Build Docker Image ─────────────────
      - name: Build Docker Image
        run: |
          docker build -t app-image:${{ github.sha }} .
          echo "Image built: app-image:${{ github.sha }}"

      # ── STEP 5: Tag Image ──────────────────────────
      - name: Tag Docker Image
        run: |
          docker tag app-image:${{ github.sha }} \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

          docker tag app-image:${{ github.sha }} \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest

      # ── STEP 6: Push Image to ECR ──────────────────
      - name: Push Image to ECR
        run: |
          docker push \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

          docker push \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest

          echo "✅ Image pushed to ECR successfully!"
          echo "Image: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${{ github.sha }}"

      # ── STEP 7: Save image tag for CD pipeline ─────
      - name: Save Image Tag
        run: echo "${{ github.sha }}" > image-tag.txt

      - name: Upload Image Tag Artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-tag
          path: image-tag.txt
